<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="400" height="400" role="img" aria-label="Warehouse pedestrian workers">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <ellipse cx="92" cy="230" rx="44" ry="5" fill="#D0D0D0" opacity="0.55"/>
  <ellipse cx="178" cy="230" rx="40" ry="4.5" fill="#D0D0D0" opacity="0.55"/>

  <!-- LEFT WORKER -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- head + hard hat -->
    <circle cx="92" cy="60" r="15" fill="#F3D6A3"/>
    <path d="M73 58 Q92 34 111 58 L111 63 L73 63 Z" fill="#FFC72C"/>
    <path d="M75 63 L109 63" stroke-width="2.5"/>
    <!-- hi-vis vest torso -->
    <path d="M70 78 L114 78 L118 150 L66 150 Z" fill="#FFC72C"/>
    <path d="M66 108 L118 108" stroke="#D0D0D0" stroke-width="4"/>
    <path d="M66 128 L118 128" stroke="#D0D0D0" stroke-width="4"/>
    <path d="M82 78 L92 92 L102 78" fill="#FFFFFF"/>
    <!-- arms -->
    <path d="M70 84 Q55 116 60 152" stroke-width="8" fill="none"/>
    <path d="M114 84 Q132 116 128 152" stroke-width="8" fill="none"/>
    <!-- hands -->
    <circle cx="60" cy="154" r="6" fill="#F3D6A3"/>
    <circle cx="128" cy="154" r="6" fill="#F3D6A3"/>
    <!-- legs -->
    <path d="M82 150 L74 220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M102 150 L110 220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- safety boots -->
    <path d="M64 224 L86 224 L86 216 L74 216 Z" fill="#2A2A2A"/>
    <path d="M100 224 L122 224 L122 216 L110 216 Z" fill="#2A2A2A"/>
  </g>

  <!-- RIGHT WORKER with clipboard -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="178" cy="62" r="14" fill="#F3D6A3"/>
    <path d="M160 60 Q178 38 196 60 L196 65 L160 65 Z" fill="#FFC72C"/>
    <!-- vest -->
    <path d="M156 80 L200 80 L202 148 L154 148 Z" fill="#FFC72C"/>
    <path d="M154 108 L202 108" stroke="#D0D0D0" stroke-width="4"/>
    <path d="M154 128 L202 128" stroke="#D0D0D0" stroke-width="4"/>
    <path d="M168 80 L178 92 L188 80" fill="#FFFFFF"/>
    <!-- arm holding clipboard -->
    <path d="M160 86 Q142 114 152 140" stroke-width="8" fill="none"/>
    <path d="M200 86 Q216 118 212 152" stroke-width="8" fill="none"/>
    <circle cx="212" cy="154" r="6" fill="#F3D6A3"/>
    <!-- clipboard -->
    <rect x="138" y="114" width="28" height="34" fill="#D0D0D0"/>
    <rect x="148" y="110" width="10" height="8" fill="#2A2A2A"/>
    <path d="M144 124 L160 124 M144 132 L160 132 M144 140 L156 140" stroke-width="2"/>
    <!-- legs -->
    <path d="M168 148 L164 220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M188 148 L192 220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M154 224 L176 224 L176 216 L164 216 Z" fill="#2A2A2A"/>
    <path d="M182 224 L204 224 L204 216 L192 216 Z" fill="#2A2A2A"/>
  </g>
</svg>
