<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="400" height="400" role="img" aria-label="Tow tractor tugger with trailer cart">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <ellipse cx="128" cy="230" rx="124" ry="6" fill="#D0D0D0" opacity="0.55"/>

  <!-- tugger tractor unit (right) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <!-- body -->
    <rect x="130" y="108" width="108" height="92" rx="6" fill="#FFC72C"/>
    <!-- enclosed cab -->
    <path d="M138 108 L138 32 L232 32 L232 108" stroke-width="5" fill="none"/>
    <rect x="146" y="42" width="80" height="54" fill="#D0D0D0"/>
    <path d="M186 42 L186 96" stroke-width="2"/>
    <!-- roof light -->
    <rect x="172" y="24" width="22" height="10" rx="2" fill="#FFC72C"/>
    <!-- hood / battery -->
    <path d="M130 130 L236 130" stroke-width="2"/>
    <path d="M138 148 L228 148 M138 164 L228 164 M138 180 L228 180" stroke-width="2"/>
    <!-- steering wheel visible through windscreen -->
    <circle cx="180" cy="64" r="7" fill="none" stroke-width="2"/>
    <!-- seat -->
    <path d="M192 58 L218 58 L216 90 L192 90 Z" fill="#2A2A2A"/>
  </g>

  <!-- tow pin / drawbar hitch at rear (left) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="108" y="162" width="24" height="14" fill="#FFC72C"/>
    <circle cx="118" cy="169" r="6" fill="#2A2A2A"/>
  </g>

  <!-- trailer cart being towed (left) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <!-- drawbar connecting -->
    <path d="M108 169 L74 178" stroke-width="4"/>
    <!-- cart base -->
    <rect x="10" y="160" width="66" height="22" fill="#D0D0D0"/>
    <!-- cart side walls -->
    <path d="M10 160 L10 116 L76 116 L76 160" stroke-width="3" fill="none"/>
    <!-- boxes stacked -->
    <rect x="16" y="122" width="24" height="38" fill="#FFC72C" stroke="#2A2A2A" stroke-width="2"/>
    <rect x="44" y="130" width="28" height="30" fill="#FFC72C" stroke="#2A2A2A" stroke-width="2"/>
    <!-- cart small wheels -->
    <circle cx="24" cy="192" r="8" fill="#2A2A2A"/>
    <circle cx="62" cy="192" r="8" fill="#2A2A2A"/>
  </g>

  <!-- tractor wheels -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#2A2A2A">
    <circle cx="156" cy="216" r="16"/>
    <circle cx="156" cy="216" r="5" fill="#D0D0D0"/>
    <circle cx="216" cy="216" r="16"/>
    <circle cx="216" cy="216" r="5" fill="#D0D0D0"/>
  </g>
</svg>
