<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Manual Pallet Truck">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- Operator (standing, leaning on pump handle) -->
  <g fill="#111111">
    <circle cx="82" cy="54" r="11"/>
    <path d="M74 68 L92 68 L100 130 L104 176 L94 178 L88 134 L82 180 L72 180 L74 134 L70 130 Z"/>
    <!-- arm reaching forward to pump handle -->
    <path d="M92 76 L146 96 L150 102 L144 106 L88 88 Z"/>
  </g>
  <!-- Pump handle (diagonal, the tell) -->
  <g fill="#111111">
    <path d="M144 90 L162 196 L170 196 L152 88 Z"/>
    <rect x="138" y="82" width="22" height="10" rx="3"/>
  </g>
  <!-- Pallet jack body and forks under pallet -->
  <g fill="#111111">
    <!-- drive head -->
    <path d="M150 190 L180 190 L184 210 L148 210 Z"/>
    <!-- forks (long, low) -->
    <rect x="116" y="200" width="80" height="6"/>
    <rect x="116" y="200" width="6" height="14"/>
    <rect x="190" y="200" width="6" height="14"/>
    <!-- steer wheel at drive head -->
    <circle cx="166" cy="210" r="6"/>
    <!-- load wheels at fork tips -->
    <circle cx="122" cy="212" r="4"/>
  </g>
</svg>
