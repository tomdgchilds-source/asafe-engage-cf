<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="400" height="400" role="img" aria-label="Manual hand-pump pallet jack">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <ellipse cx="140" cy="224" rx="104" ry="6" fill="#D0D0D0" opacity="0.55"/>

  <!-- forks under pallet -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round" fill="#FFC72C">
    <rect x="60" y="180" width="176" height="16" rx="2"/>
    <rect x="60" y="200" width="176" height="10" rx="2" fill="#2A2A2A"/>
    <!-- fork tip taper -->
    <path d="M60 180 L50 184 L50 192 L60 196 Z" fill="#FFC72C"/>
  </g>

  <!-- chassis / power head housing (where pump mechanism sits) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="204" y="140" width="44" height="56" rx="4" fill="#FFC72C"/>
    <rect x="212" y="150" width="28" height="14" rx="2" fill="#2A2A2A"/>
    <!-- hydraulic cylinder mount stud -->
    <circle cx="226" cy="174" r="4" fill="#2A2A2A"/>
  </g>

  <!-- tiller handle (long curved, angled up-left) -->
  <g stroke="#2A2A2A" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M226 150 Q200 90 140 50"/>
  </g>
  <!-- tiller grip -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="110" y="36" width="44" height="22" rx="10" fill="#FFC72C"/>
    <!-- control lever on grip -->
    <rect x="122" y="28" width="20" height="8" rx="3" fill="#2A2A2A"/>
    <!-- pump release trigger -->
    <path d="M146 46 L162 42 L162 50 L146 52 Z" fill="#2A2A2A"/>
  </g>

  <!-- front steer wheels (two small, under power head) -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#2A2A2A">
    <circle cx="218" cy="212" r="12"/>
    <circle cx="218" cy="212" r="4" fill="#D0D0D0"/>
  </g>
  <!-- rear fork load wheels (small at tip) -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#2A2A2A">
    <circle cx="72" cy="214" r="8"/>
    <circle cx="72" cy="214" r="2.5" fill="#D0D0D0"/>
  </g>

  <!-- pallet on forks -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#D0D0D0">
    <rect x="70" y="138" width="140" height="38" rx="2"/>
    <path d="M70 152 L210 152 M70 166 L210 166" stroke-width="2"/>
    <!-- pallet slats -->
    <rect x="88" y="176" width="10" height="6" fill="#2A2A2A"/>
    <rect x="134" y="176" width="10" height="6" fill="#2A2A2A"/>
    <rect x="180" y="176" width="10" height="6" fill="#2A2A2A"/>
  </g>
</svg>
