<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="400" height="400" role="img" aria-label="Light commercial delivery van">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <ellipse cx="128" cy="224" rx="124" ry="6" fill="#D0D0D0" opacity="0.55"/>

  <!-- main body (Sprinter / Transit style panel van) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <path d="M14 192 L14 124 Q14 102 34 98 L80 90 L208 90 Q234 90 240 108 L248 174 L248 192 Z" fill="#FFC72C"/>
    <!-- hood crease line -->
    <path d="M14 128 L78 108" stroke-width="2"/>
    <!-- panel line along side -->
    <path d="M80 156 L240 156" stroke-width="2"/>
    <!-- windscreen -->
    <path d="M22 128 L72 114 L76 140 L22 140 Z" fill="#D0D0D0"/>
    <!-- driver's side window -->
    <rect x="82" y="104" width="44" height="30" fill="#D0D0D0"/>
    <!-- cargo rear windows (small high) -->
    <rect x="132" y="104" width="32" height="16" fill="#D0D0D0"/>
    <!-- sliding side door seam -->
    <path d="M130 104 L130 190" stroke-width="2"/>
    <path d="M200 104 L200 190" stroke-width="2"/>
    <!-- rear door seam -->
    <path d="M240 108 L240 192" stroke-width="3"/>
    <!-- door handle -->
    <rect x="194" y="148" width="8" height="4" fill="#2A2A2A"/>
    <!-- wing mirror -->
    <path d="M64 106 L76 94 L80 98 L70 110 Z" fill="#2A2A2A"/>
    <!-- headlamp -->
    <rect x="18" y="146" width="18" height="16" rx="2" fill="#D0D0D0" stroke="#2A2A2A" stroke-width="2"/>
    <!-- grille -->
    <rect x="40" y="146" width="36" height="18" fill="#2A2A2A"/>
    <path d="M40 152 L76 152 M40 158 L76 158" stroke="#D0D0D0" stroke-width="2"/>
    <!-- bumper -->
    <rect x="14" y="180" width="234" height="14" fill="#2A2A2A"/>
    <!-- fuel filler -->
    <circle cx="190" cy="170" r="5" fill="#2A2A2A"/>
  </g>

  <!-- wheel arches (subtle) -->
  <g stroke="#2A2A2A" stroke-width="2" fill="none">
    <path d="M56 192 Q80 168 104 192"/>
    <path d="M192 192 Q216 168 240 192"/>
  </g>

  <!-- wheels -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#2A2A2A">
    <circle cx="80" cy="208" r="18"/>
    <circle cx="80" cy="208" r="7" fill="#D0D0D0"/>
    <path d="M68 208 L92 208 M80 196 L80 220" stroke="#D0D0D0" stroke-width="2"/>
    <circle cx="216" cy="208" r="18"/>
    <circle cx="216" cy="208" r="7" fill="#D0D0D0"/>
    <path d="M204 208 L228 208 M216 196 L216 220" stroke="#D0D0D0" stroke-width="2"/>
  </g>
</svg>
