<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Counterbalance Forklift 1.5T">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- COMPACT 1.5T: small counterweight, single-stage mast, short overhead guard -->
  <g fill="#111111">
    <!-- Single-stage mast (short, ~140 tall) -->
    <rect x="76" y="78" width="8" height="130"/>
    <rect x="90" y="78" width="8" height="130"/>
    <rect x="72" y="72" width="30" height="10"/>
    <!-- Short forks -->
    <rect x="44" y="190" width="52" height="6"/>
    <rect x="44" y="190" width="6" height="14"/>
    <rect x="90" y="190" width="6" height="14"/>
    <!-- Chassis (compact) -->
    <path d="M98 130 L170 130 L188 170 L188 208 L98 208 Z"/>
    <!-- Small counterweight -->
    <path d="M178 172 L196 172 L196 208 L178 208 Z"/>
    <!-- Overhead guard (short, above cab) -->
    <rect x="102" y="64" width="6" height="72"/>
    <rect x="166" y="64" width="6" height="72"/>
    <rect x="100" y="60" width="76" height="8"/>
    <!-- Seat/operator (seated driver) -->
    <circle cx="130" cy="90" r="10"/>
    <path d="M122 104 L138 104 L142 132 L118 132 Z"/>
    <!-- wheels -->
    <circle cx="114" cy="212" r="10"/>
    <circle cx="176" cy="212" r="10"/>
  </g>
</svg>
