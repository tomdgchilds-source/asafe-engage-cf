<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="400" height="400" role="img" aria-label="Walkie stacker with vertical mast">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <ellipse cx="140" cy="228" rx="104" ry="6" fill="#D0D0D0" opacity="0.55"/>

  <!-- vertical mast (tall double-channel) -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="64" y="24" width="14" height="186" fill="#D0D0D0"/>
    <rect x="84" y="24" width="14" height="186" fill="#D0D0D0"/>
    <!-- mast crown -->
    <rect x="60" y="20" width="42" height="10" fill="#2A2A2A"/>
    <!-- cross bracing -->
    <path d="M62 60 L100 60 M62 110 L100 110 M62 160 L100 160" stroke-width="2"/>
    <!-- lift chain -->
    <path d="M84 28 L84 140" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- carriage with forks raised part-way -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="56" y="130" width="50" height="16" fill="#FFC72C"/>
    <!-- forks protruding forward -->
    <rect x="20" y="148" width="64" height="8" fill="#FFC72C"/>
    <rect x="20" y="158" width="64" height="6" fill="#2A2A2A"/>
    <path d="M20 148 L12 151 L12 159 L20 162 Z" fill="#FFC72C"/>
  </g>

  <!-- power head / body -->
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="108" y="100" width="76" height="110" rx="4" fill="#FFC72C"/>
    <!-- display -->
    <rect x="118" y="110" width="56" height="22" rx="2" fill="#2A2A2A"/>
    <rect x="122" y="114" width="48" height="14" fill="#D0D0D0"/>
    <!-- battery vents -->
    <path d="M118 144 L174 144 M118 154 L174 154 M118 164 L174 164" stroke-width="2"/>
    <!-- A-SAFE inspired side stripe -->
    <rect x="108" y="178" width="76" height="10" fill="#2A2A2A"/>
  </g>

  <!-- tiller -->
  <g stroke="#2A2A2A" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M170 100 Q190 64 230 50"/>
  </g>
  <g stroke="#2A2A2A" stroke-width="3" stroke-linejoin="round">
    <rect x="208" y="38" width="42" height="22" rx="10" fill="#FFC72C"/>
    <circle cx="220" cy="50" r="6" fill="#2A2A2A"/>
    <circle cx="238" cy="50" r="6" fill="#2A2A2A"/>
  </g>

  <!-- drive wheel -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#2A2A2A">
    <circle cx="148" cy="218" r="14"/>
    <circle cx="148" cy="218" r="5" fill="#D0D0D0"/>
  </g>
  <!-- outrigger stabiliser -->
  <g stroke="#2A2A2A" stroke-width="3" fill="#FFC72C">
    <rect x="94" y="188" width="18" height="22" rx="2"/>
  </g>
  <circle cx="103" cy="218" r="8" fill="#2A2A2A" stroke="#2A2A2A" stroke-width="3"/>
</svg>
