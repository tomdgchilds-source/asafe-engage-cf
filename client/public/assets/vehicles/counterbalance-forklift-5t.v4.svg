<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Counterbalance Forklift 5T">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- LARGER 5T: 3-stage mast, beefy counterweight, exhaust stack -->
  <g fill="#111111">
    <!-- 3-stage mast (telescoping layers visible) -->
    <rect x="58" y="30" width="8" height="180"/>
    <rect x="72" y="30" width="8" height="180"/>
    <!-- inner 2nd stage -->
    <rect x="64" y="16" width="10" height="40"/>
    <!-- inner 3rd stage -->
    <rect x="66" y="8" width="6" height="20"/>
    <rect x="54" y="22" width="32" height="10"/>
    <!-- Heavy forks -->
    <rect x="22" y="188" width="66" height="8"/>
    <rect x="22" y="188" width="6" height="18"/>
    <rect x="82" y="188" width="6" height="18"/>
    <!-- Chassis (large) -->
    <path d="M84 100 L196 100 L220 158 L222 208 L84 208 Z"/>
    <!-- Beefy counterweight -->
    <path d="M202 154 L228 154 L230 208 L202 208 Z"/>
    <!-- Exhaust stack (the tell for big diesel) -->
    <rect x="182" y="40" width="10" height="62"/>
    <rect x="178" y="34" width="18" height="10"/>
    <!-- Overhead guard -->
    <rect x="94" y="32" width="6" height="74"/>
    <rect x="170" y="32" width="6" height="74"/>
    <rect x="92" y="26" width="86" height="8"/>
    <rect x="96" y="44" width="78" height="4"/>
    <!-- Operator -->
    <circle cx="128" cy="64" r="11"/>
    <path d="M120 78 L136 78 L142 110 L114 110 Z"/>
    <!-- Big wheels -->
    <circle cx="112" cy="212" r="14"/>
    <circle cx="196" cy="212" r="14"/>
  </g>
</svg>
