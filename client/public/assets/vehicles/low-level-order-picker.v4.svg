<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Low-Level Order Picker">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- Operator standing on low platform -->
  <g fill="#111111">
    <circle cx="170" cy="52" r="11"/>
    <path d="M162 66 L178 66 L184 126 L188 172 L178 174 L172 130 L166 174 L156 174 L158 130 L154 126 Z"/>
    <!-- arm on control handle -->
    <path d="M162 76 L124 92 L120 100 L128 106 L166 88 Z"/>
  </g>
  <!-- Low platform + control handle (the tell) -->
  <g fill="#111111">
    <!-- control head / handle -->
    <rect x="108" y="84" width="22" height="14" rx="3"/>
    <rect x="114" y="98" width="10" height="70"/>
    <!-- step platform operator stands on -->
    <rect x="140" y="174" width="60" height="10"/>
    <rect x="140" y="184" width="60" height="20"/>
    <!-- drive unit -->
    <path d="M198 168 L222 168 L228 208 L196 208 Z"/>
    <circle cx="212" cy="210" r="7"/>
  </g>
  <!-- Pallet-size forks at the front -->
  <g fill="#111111">
    <rect x="30" y="200" width="94" height="6"/>
    <rect x="30" y="200" width="6" height="14"/>
    <rect x="118" y="200" width="6" height="14"/>
    <circle cx="38" cy="212" r="4"/>
    <circle cx="112" cy="212" r="4"/>
  </g>
</svg>
