<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="High-Level Order Picker">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- Tall 2-stage mast going near top of frame -->
  <g fill="#111111">
    <rect x="86" y="20" width="8" height="196"/>
    <rect x="100" y="20" width="8" height="196"/>
    <rect x="82" y="14" width="30" height="10"/>
  </g>
  <!-- Raised cab at top of mast with operator inside -->
  <g fill="#111111">
    <!-- cab floor/platform -->
    <rect x="108" y="44" width="86" height="8"/>
    <!-- cab railings -->
    <rect x="108" y="20" width="6" height="28"/>
    <rect x="188" y="20" width="6" height="28"/>
    <rect x="108" y="20" width="86" height="6"/>
    <!-- cross-bar rail -->
    <rect x="114" y="32" width="80" height="4"/>
    <!-- Operator in cab -->
    <circle cx="148" cy="52" r="10"/>
    <path d="M140 64 L156 64 L162 102 L162 120 L148 120 L140 120 L134 102 Z"/>
  </g>
  <!-- Forks extended beneath cab -->
  <g fill="#111111">
    <rect x="108" y="58" width="80" height="6"/>
    <rect x="108" y="64" width="6" height="16"/>
    <rect x="182" y="64" width="6" height="16"/>
  </g>
  <!-- Chassis base + wheels -->
  <g fill="#111111">
    <path d="M70 184 L210 184 L216 210 L64 210 Z"/>
    <circle cx="92" cy="214" r="8"/>
    <circle cx="188" cy="214" r="8"/>
  </g>
</svg>
