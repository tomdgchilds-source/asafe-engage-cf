<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Very Narrow Aisle VNA Truck">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <line x1="16" y1="216" x2="240" y2="216" stroke="#EEEEEE" stroke-width="1"/>
  <!-- Tall mast, centered in frame (VNA works between racks) -->
  <g fill="#111111">
    <rect x="122" y="16" width="8" height="196"/>
    <rect x="136" y="16" width="8" height="196"/>
    <rect x="118" y="10" width="30" height="8"/>
  </g>
  <!-- Rotating turret head indicator (arc at top) -->
  <g fill="none" stroke="#111111" stroke-width="3">
    <path d="M108 28 A 24 10 0 0 1 158 28"/>
  </g>
  <g fill="#111111">
    <!-- arrow tip on arc -->
    <path d="M154 24 L164 28 L154 34 Z"/>
  </g>
  <!-- Elevated turret-style cab between the forks -->
  <g fill="#111111">
    <rect x="94" y="64" width="78" height="70"/>
    <!-- Operator inside elevated cab -->
    <circle cx="118" cy="80" r="9" fill="#FFFFFF"/>
    <rect x="108" y="92" width="22" height="22" fill="#FFFFFF"/>
    <!-- cab railings / window frame -->
    <rect x="94" y="64" width="78" height="4"/>
    <rect x="94" y="128" width="78" height="6"/>
  </g>
  <!-- Forks beside the elevated cab (rotate-head turret with forks) -->
  <g fill="#111111">
    <rect x="84" y="138" width="100" height="6"/>
    <rect x="84" y="138" width="6" height="16"/>
    <rect x="178" y="138" width="6" height="16"/>
  </g>
  <!-- Lower chassis (narrow footprint) -->
  <g fill="#111111">
    <path d="M88 184 L180 184 L184 208 L84 208 Z"/>
    <circle cx="102" cy="212" r="7"/>
    <circle cx="168" cy="212" r="7"/>
  </g>
</svg>
