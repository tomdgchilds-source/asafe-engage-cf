<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#F8F9FA"/>
  
  <!-- A-SAFE Yellow Brand Background -->
  <rect x="20" y="20" width="360" height="260" rx="20" fill="#FFD700" stroke="#E6C200" stroke-width="2"/>
  
  <!-- eFlex Single RackEnd Guardrail Silhouette -->
  <!-- Main Guardrail (Single Rail - Flexible Design) -->
  <rect x="60" y="140" width="280" height="16" rx="8" fill="#FFA500"/>
  <rect x="60" y="143" width="280" height="10" rx="5" fill="#FF8C00"/>
  
  <!-- Flexible Support Posts (Thinner for eFlex) -->
  <rect x="75" y="115" width="12" height="70" rx="6" fill="#FFD700"/>
  <rect x="105" y="115" width="12" height="70" rx="6" fill="#FFD700"/>
  <rect x="283" y="115" width="12" height="70" rx="6" fill="#FFD700"/>
  <rect x="313" y="115" width="12" height="70" rx="6" fill="#FFD700"/>
  
  <!-- Circular End Posts (Smaller for eFlex) -->
  <circle cx="81" cy="148" r="18" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  <circle cx="319" cy="148" r="18" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Spinning Collars -->
  <circle cx="81" cy="148" r="12" fill="#FF8C00"/>
  <circle cx="319" cy="148" r="12" fill="#FF8C00"/>
  <circle cx="81" cy="148" r="6" fill="#FFA500"/>
  <circle cx="319" cy="148" r="6" fill="#FFA500"/>
  
  <!-- Base Plates -->
  <rect x="72" y="180" width="18" height="8" rx="2" fill="#2C3E50"/>
  <rect x="310" y="180" width="18" height="8" rx="2" fill="#2C3E50"/>
  
  <!-- Flexibility Indicators (Curved Lines) -->
  <path d="M 60 148 Q 80 135 100 148" stroke="#34495E" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 300 148 Q 320 135 340 148" stroke="#34495E" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- A-SAFE Branding -->
  <text x="200" y="230" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">A-SAFE</text>
  <text x="200" y="250" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="16">eFlex™ Single RackEnd</text>
  
  <!-- Product Features Text -->
  <text x="200" y="275" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Flexible Rack Protection</text>
</svg>