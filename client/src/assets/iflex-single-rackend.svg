<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#F8F9FA"/>
  
  <!-- A-SAFE Yellow Brand Background -->
  <rect x="20" y="20" width="360" height="260" rx="20" fill="#FFD700" stroke="#E6C200" stroke-width="2"/>
  
  <!-- iFlex Single RackEnd Guardrail Silhouette -->
  <!-- Main Guardrail (Single Rail) -->
  <rect x="60" y="140" width="280" height="18" rx="9" fill="#FFA500"/>
  <rect x="60" y="144" width="280" height="10" rx="5" fill="#FF8C00"/>
  
  <!-- Support Posts -->
  <rect x="70" y="110" width="14" height="80" rx="7" fill="#FFD700"/>
  <rect x="100" y="110" width="14" height="80" rx="7" fill="#FFD700"/>
  <rect x="286" y="110" width="14" height="80" rx="7" fill="#FFD700"/>
  <rect x="316" y="110" width="14" height="80" rx="7" fill="#FFD700"/>
  
  <!-- Circular End Posts with Spinning Collars -->
  <circle cx="77" cy="149" r="20" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
  <circle cx="323" cy="149" r="20" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
  
  <!-- Spinning Collars (Key iFlex Feature) -->
  <circle cx="77" cy="149" r="14" fill="#FF8C00"/>
  <circle cx="323" cy="149" r="14" fill="#FF8C00"/>
  <circle cx="77" cy="149" r="8" fill="#FFA500"/>
  <circle cx="323" cy="149" r="8" fill="#FFA500"/>
  
  <!-- Base Plates -->
  <rect x="67" y="185" width="20" height="10" rx="3" fill="#2C3E50"/>
  <rect x="313" y="185" width="20" height="10" rx="3" fill="#2C3E50"/>
  
  <!-- A-SAFE Branding -->
  <text x="200" y="230" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">A-SAFE</text>
  <text x="200" y="250" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="16">iFlex™ Single RackEnd</text>
  
  <!-- Product Features Text -->
  <text x="200" y="275" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Heavy-Duty Rack Protection</text>
</svg>