name = "asafe-engage"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "57fbf5ae68a54b718eb88802940e9415"
preview_id = "bd84ede39c024211967ae53cf2391256"

# R2 bucket for file storage (images, documents)
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "asafe-engage-files"

# KV-based file storage (works without R2)
[[kv_namespaces]]
binding = "FILES_STORE"
id = "c56114bdecec4bc08cd4939b8c5f1d72"

# Scheduled cron triggers. Runs the `scheduled` handler exported from
# worker/index.ts, which kicks off the weekly CSV backup of core tables to
# the R2 bucket (see worker/scheduled/backupExporter.ts and
# scripts/data/BACKUP-NOTES.md).
[triggers]
crons = ["0 3 * * SUN"]   # 03:00 UTC every Sunday

[vars]
NODE_ENV = "production"
# TURNSTILE_SITE_KEY = "0x4AAAAAAA..."   # public; safe to commit. Pair with TURNSTILE_SECRET_KEY secret (wrangler secret put TURNSTILE_SECRET_KEY).

# Secrets (set via: wrangler secret put <NAME>):
# DATABASE_URL
# SESSION_SECRET
# RESEND_API_KEY
# EMAIL_FROM
# ADMIN_NOTIFICATION_EMAILS
# OPENAI_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# APPLE_CLIENT_ID
# APPLE_CLIENT_SECRET
# APP_URL
# WHATSAPP_ACCESS_TOKEN
# WHATSAPP_PHONE_NUMBER_ID
# CONTACT_EMAIL
